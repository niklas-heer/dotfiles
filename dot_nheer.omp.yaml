# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

upgrade:
  source: cdn
  interval: 168h
  auto: false
  notice: false

transient_prompt:
  template: "{{ if eq .Code 0 }}<#63F08C>{{ .Shell }} ❯</>{{ else }}<#e91e63>{{ .Shell }} ✘</>{{ end }} "

tooltips_action: replace
tooltips:
  - type: git
    tips:
      - git
    template: "{{ .HEAD }}"
    foreground: "#C678DD"
    style: plain

blocks:
  - type: prompt
    alignment: left
    newline: true
    segments:
      - template: "root <#ffffff>in</> "
        foreground: "#E06C75"
        type: root
        style: plain
      - properties:
          style: unique
          mapped_locations:
            /Users/nheer: 🏠
        template: "{{ .Path }} "
        foreground: "#55B9C4"
        type: path
        style: plain
      - properties:
          fetch_status: true
        template: "<#ffffff>on</> {{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} \uf044 {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} \uf046 {{ .Staging.String }}{{ end }} "
        foreground: "#C678DD"
        type: git
        style: plain
      - properties:
          fetch_version: true
        min_width: 110
        template: "<#ffffff>via</> \ue781 {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }} "
        foreground: "#98C379"
        type: node
        style: plain
  - type: prompt
    alignment: left
    newline: true
    segments:
      - template: "{{ .Name }} "
        foreground: "#63F08C"
        type: shell
        style: plain
      - template: "{{ if eq .Code 0 }}<#63F08C>\u276f{{ else }}<#e91e63>\u2718{{ end }} "
        properties:
          always_enabled: true
        foreground: "#63F08C"
        type: status
        style: plain

version: 3
